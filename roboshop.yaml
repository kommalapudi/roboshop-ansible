# ansible-playbook -i localhost, roboshop.yaml -e 'instances=["mongodb","catalogue","redis","user","cart","mysql","shipping","rabbitmq","payment","frontend"]' roboshop.yaml
- name: create ec2 and route53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-0cecc7f37156227f4
    ami_id: ami-0220d79f3f480ecf5
    domain_name: kcdevops.online
    env: dev
    action: create
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      #key_name: "{{ key_name }}"
      instance_type: "t3.micro"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      wait: false
      tags:
        project: roboshop
        component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output
    when: action == 'create'

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
    when: action == 'create'

  - name: create route53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}" #mongodb-dev.kcdevops.online, frontend-dev.kcdevops.online
      type: A
      ttl: 1
      value: "{{ item.private_ip_address }}"
      wait: false
      overwrite: true
    loop: "{{ ec2_output.results }}" # list
    when: action == "create"
  
  - name: create public IP route53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env }}.{{ domain_name }}" #roboshop-dev.kcdevops.online
      type: A
      ttl: 1
      value: "{{ item.public_ip_address }}"
      wait: false
      overwrite: true
    loop: "{{ ec2_output.results }}"
    when:  # and
     - item.item == 'frontend'
     - action == 'create'
  
  - name: delete route53 records
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{ item }}-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when: action == 'destroy'

  - name: delete ec2 instance
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item.item }}-{{ env }}"
      wait: false
    loop: "{{ instances }}"
    when: action == 'destroy'